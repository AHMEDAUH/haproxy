---
# =============================================================================
# PostgreSQL Cluster + pgpool-II: Install & Rolling Rebuild (Zero Downtime)
# =============================================================================
# Topology:
#   pgpool01 (pgpool-II + watchdog VIP)
#   pg-primary  (PostgreSQL primary)
#   pg-replica01, pg-replica02 (streaming replicas)
#
# Run order:
#   1. Pre-flight checks
#   2. Install PostgreSQL on all nodes
#   3. Bootstrap primary
#   4. Stream replicas one-by-one (no downtime)
#   5. Install & configure pgpool-II
#   6. Perform rolling rebuild of replicas through pgpool
# =============================================================================

# ---------------------------------------------------------------------------
# PLAY 1 – Pre-flight checks
# ---------------------------------------------------------------------------
- name: "Pre-flight: Validate environment"
  hosts: all
  gather_facts: true
  tasks:

    - name: Assert OS is RHEL/CentOS/Rocky 8+
      ansible.builtin.assert:
        that:
          - ansible_os_family == "RedHat"
          - ansible_distribution_major_version | int >= 8
        fail_msg: "This playbook requires RHEL/CentOS/Rocky 8 or later."

    - name: Check required ports are not already bound by other services
      ansible.builtin.wait_for:
        port: "{{ item }}"
        state: stopped
        timeout: 3
      loop:
        - "{{ pg_port }}"
        - "{{ pgpool_port }}"
      when: inventory_hostname in groups['pgpool']
      ignore_errors: true
      register: port_check

    - name: Enable EPEL and PostgreSQL repo
      ansible.builtin.yum:
        name:
          - "https://download.postgresql.org/pub/repos/yum/reporpms/EL-\
             {{ ansible_distribution_major_version }}-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
          - epel-release
        state: present
        disable_gpg_check: true

    - name: Disable built-in PostgreSQL AppStream module
      ansible.builtin.command: dnf -qy module disable postgresql
      changed_when: true
      when: ansible_distribution_major_version | int >= 8

    - name: Install common utilities
      ansible.builtin.yum:
        name:
          - python3-psycopg2
          - python3-libselinux
          - firewalld
          - net-tools
          - rsync
        state: present


# ---------------------------------------------------------------------------
# PLAY 2 – Install PostgreSQL on all DB nodes
# ---------------------------------------------------------------------------
- name: "PostgreSQL: Install packages"
  hosts: postgres
  tasks:

    - name: Install PostgreSQL server packages
      ansible.builtin.yum:
        name:
          - "postgresql{{ pg_version | replace('.','') }}-server"
          - "postgresql{{ pg_version | replace('.','') }}-contrib"
          - "postgresql{{ pg_version | replace('.','') }}"
        state: present

    - name: Create PostgreSQL log directory
      ansible.builtin.file:
        path: "{{ pg_log_dir }}"
        owner: postgres
        group: postgres
        mode: "0750"
        state: directory


# ---------------------------------------------------------------------------
# PLAY 3 – Bootstrap PRIMARY
# ---------------------------------------------------------------------------
- name: "PostgreSQL: Bootstrap primary"
  hosts: postgres_primary
  tasks:

    - name: Check if cluster is already initialised
      ansible.builtin.stat:
        path: "{{ pg_data_dir }}/PG_VERSION"
      register: pg_initialized

    - name: Initialise PostgreSQL data directory
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/postgresql-{{ pg_version | replace('.','') }}-setup initdb
      when: not pg_initialized.stat.exists
      changed_when: true

    - name: Deploy postgresql.conf
      ansible.builtin.template:
        src: templates/postgresql.conf.j2
        dest: "{{ pg_data_dir }}/postgresql.conf"
        owner: postgres
        group: postgres
        mode: "0600"
      notify: Reload PostgreSQL

    - name: Deploy pg_hba.conf
      ansible.builtin.template:
        src: templates/pg_hba.conf.j2
        dest: "{{ pg_data_dir }}/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: "0600"
      notify: Reload PostgreSQL

    - name: Start & enable PostgreSQL primary
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: started
        enabled: true

    - name: Flush handlers (apply config before user tasks)
      ansible.builtin.meta: flush_handlers

    - name: Create replication user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ pg_replication_user }}"
        password: "{{ pg_replication_password }}"
        role_attr_flags: REPLICATION,LOGIN
        state: present

    - name: Create application database (if not exists)
      become_user: postgres
      community.postgresql.postgresql_db:
        name: appdb
        state: present

    - name: Create pgpool health-check user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: pgpool
        password: "{{ pg_superuser_password }}"
        role_attr_flags: LOGIN,SUPERUSER
        state: present

    - name: Create replication slots for each replica
      become_user: postgres
      community.postgresql.postgresql_slot:
        name: "{{ pg_replication_slot_prefix }}_{{ item | replace('-','_') }}"
        slot_type: physical
        state: present
      loop: "{{ groups['postgres_replicas'] }}"

    - name: Open firewall for PostgreSQL
      ansible.posix.firewalld:
        port: "{{ pg_port }}/tcp"
        state: enabled
        permanent: true
        immediate: true

  handlers:
    - name: Reload PostgreSQL
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: reloaded


# ---------------------------------------------------------------------------
# PLAY 4 – Stream replicas (rolling, one at a time)
# ---------------------------------------------------------------------------
- name: "PostgreSQL: Build replicas via pg_basebackup"
  hosts: postgres_replicas
  serial: 1          # <-- one replica at a time → no cluster-wide downtime
  tasks:

    - name: Check if replica already has data directory
      ansible.builtin.stat:
        path: "{{ pg_data_dir }}/PG_VERSION"
      register: replica_initialized

    - name: Stop PostgreSQL if running (pre-clone)
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: stopped
      when: replica_initialized.stat.exists
      ignore_errors: true

    - name: Remove old data directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        state: absent
      when: replica_initialized.stat.exists

    - name: Create fresh data directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        owner: postgres
        group: postgres
        mode: "0700"
        state: directory

    - name: Clone from primary with pg_basebackup
      become_user: postgres
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/pg_basebackup
          -h {{ hostvars[groups['postgres_primary'][0]].ansible_host }}
          -U {{ pg_replication_user }}
          -D {{ pg_data_dir }}
          -P -Xs -R
          --slot={{ pg_replication_slot_prefix }}_{{ inventory_hostname | replace('-','_') }}
      environment:
        PGPASSWORD: "{{ pg_replication_password }}"
      changed_when: true

    - name: Deploy postgresql.conf on replica
      ansible.builtin.template:
        src: templates/postgresql.conf.j2
        dest: "{{ pg_data_dir }}/postgresql.conf"
        owner: postgres
        group: postgres
        mode: "0600"

    - name: Deploy pg_hba.conf on replica
      ansible.builtin.template:
        src: templates/pg_hba.conf.j2
        dest: "{{ pg_data_dir }}/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: "0600"

    - name: Start & enable PostgreSQL replica
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: started
        enabled: true

    - name: Wait for replica to enter streaming state
      become_user: postgres
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/psql -p {{ pg_port }}
          -c "SELECT pg_is_in_recovery();"
      register: recovery_check
      until: "'t' in recovery_check.stdout"
      retries: 15
      delay: 5
      changed_when: false

    - name: Open firewall for PostgreSQL on replica
      ansible.posix.firewalld:
        port: "{{ pg_port }}/tcp"
        state: enabled
        permanent: true
        immediate: true


# ---------------------------------------------------------------------------
# PLAY 5 – Install & configure pgpool-II
# ---------------------------------------------------------------------------
- name: "pgpool-II: Install and configure"
  hosts: pgpool
  tasks:

    - name: Install pgpool-II packages
      ansible.builtin.yum:
        name:
          - "pgpool-II-pg{{ pg_version | replace('.','') }}"
          - "pgpool-II-pg{{ pg_version | replace('.','') }}-extensions"
        state: present

    - name: Create pgpool log directory
      ansible.builtin.file:
        path: "{{ pgpool_log_dir }}"
        owner: postgres
        group: postgres
        mode: "0750"
        state: directory

    - name: Deploy pgpool.conf
      ansible.builtin.template:
        src: templates/pgpool.conf.j2
        dest: "{{ pgpool_conf_dir }}/pgpool.conf"
        owner: postgres
        group: postgres
        mode: "0640"
      notify: Reload pgpool

    - name: Deploy pool_hba.conf
      ansible.builtin.template:
        src: templates/pool_hba.conf.j2
        dest: "{{ pgpool_conf_dir }}/pool_hba.conf"
        owner: postgres
        group: postgres
        mode: "0640"
      notify: Reload pgpool

    - name: Deploy pcp.conf (PCP admin user)
      ansible.builtin.template:
        src: templates/pcp.conf.j2
        dest: "{{ pgpool_conf_dir }}/pcp.conf"
        owner: postgres
        group: postgres
        mode: "0640"

    - name: Deploy pool_passwd file
      ansible.builtin.template:
        src: templates/pool_passwd.j2
        dest: "{{ pgpool_conf_dir }}/pool_passwd"
        owner: postgres
        group: postgres
        mode: "0640"

    - name: Deploy watchdog escalation scripts
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "{{ pgpool_conf_dir }}/{{ item }}"
        owner: postgres
        group: postgres
        mode: "0750"
      loop:
        - escalation.sh
        - de-escalation.sh

    - name: Deploy pgpool systemd override (startup delay)
      ansible.builtin.template:
        src: templates/pgpool-override.conf.j2
        dest: /etc/systemd/system/pgpool.service.d/override.conf
        mode: "0644"
      notify:
        - Reload systemd
        - Restart pgpool

    - name: Open firewall ports for pgpool
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - "{{ pgpool_port }}"
        - "{{ pgpool_pcp_port }}"
        - "{{ pgpool_wd_port }}"

    - name: Start & enable pgpool-II
      ansible.builtin.systemd:
        name: pgpool
        state: started
        enabled: true

    - name: Wait for pgpool to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ pgpool_port }}"
        timeout: 30

    - name: Verify cluster nodes are visible through pgpool
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ pgpool_port }} -U pgpool -d template1
          -c "SHOW pool_nodes;"
      register: pool_nodes
      changed_when: false

    - name: Print pool_nodes output
      ansible.builtin.debug:
        var: pool_nodes.stdout_lines

  handlers:
    - name: Reload pgpool
      ansible.builtin.systemd:
        name: pgpool
        state: reloaded

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart pgpool
      ansible.builtin.systemd:
        name: pgpool
        state: restarted


# ---------------------------------------------------------------------------
# PLAY 6 – Rolling rebuild of replicas through pgpool (zero downtime)
# ---------------------------------------------------------------------------
- name: "Rolling rebuild: Detach → Rebuild → Re-attach replica"
  hosts: postgres_replicas
  serial: 1          # one replica at a time
  tasks:

    - name: "Get node ID in pgpool for {{ inventory_hostname }}"
      become_user: postgres
      delegate_to: "{{ groups['pgpool'][0] }}"
      ansible.builtin.shell: >
        psql -h 127.0.0.1 -p {{ pgpool_port }} -U pgpool -d template1 -tAc
        "SELECT node_id FROM pool_nodes WHERE hostname='{{ ansible_host }}';"
      register: pgpool_node_id
      changed_when: false

    - name: "Detach {{ inventory_hostname }} from pgpool"
      become_user: postgres
      delegate_to: "{{ groups['pgpool'][0] }}"
      ansible.builtin.command: >
        pcp_detach_node -h 127.0.0.1 -p {{ pgpool_pcp_port }}
          -U pgpool -w {{ pgpool_node_id.stdout | trim }}
      changed_when: true

    - name: Stop PostgreSQL on this replica
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: stopped

    - name: Remove stale data directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        state: absent

    - name: Recreate data directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        owner: postgres
        group: postgres
        mode: "0700"
        state: directory

    - name: "Reclone {{ inventory_hostname }} from primary"
      become_user: postgres
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/pg_basebackup
          -h {{ hostvars[groups['postgres_primary'][0]].ansible_host }}
          -U {{ pg_replication_user }}
          -D {{ pg_data_dir }}
          -P -Xs -R
          --slot={{ pg_replication_slot_prefix }}_{{ inventory_hostname | replace('-','_') }}
      environment:
        PGPASSWORD: "{{ pg_replication_password }}"
      changed_when: true

    - name: Restore postgresql.conf on replica
      ansible.builtin.template:
        src: templates/postgresql.conf.j2
        dest: "{{ pg_data_dir }}/postgresql.conf"
        owner: postgres
        group: postgres
        mode: "0600"

    - name: Start PostgreSQL replica
      ansible.builtin.systemd:
        name: "postgresql-{{ pg_version }}"
        state: started

    - name: Wait for replica streaming replication to catch up
      become_user: postgres
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/psql -p {{ pg_port }}
          -c "SELECT pg_is_in_recovery();"
      register: recovery_state
      until: "'t' in recovery_state.stdout"
      retries: 20
      delay: 5
      changed_when: false

    - name: Verify replication lag is acceptable (< 10 MB)
      become_user: postgres
      delegate_to: "{{ groups['postgres_primary'][0] }}"
      ansible.builtin.command: >
        /usr/pgsql-{{ pg_version }}/bin/psql -p {{ pg_port }} -tAc
        "SELECT pg_wal_lsn_diff(pg_current_wal_lsn(),
           replay_lsn) FROM pg_stat_replication
         WHERE client_addr='{{ ansible_host }}';"
      register: wal_lag
      until: (wal_lag.stdout | trim | int) < 10485760
      retries: 30
      delay: 10
      changed_when: false

    - name: "Re-attach {{ inventory_hostname }} to pgpool"
      become_user: postgres
      delegate_to: "{{ groups['pgpool'][0] }}"
      ansible.builtin.command: >
        pcp_attach_node -h 127.0.0.1 -p {{ pgpool_pcp_port }}
          -U pgpool -w {{ pgpool_node_id.stdout | trim }}
      changed_when: true

    - name: Pause 15 s to allow pgpool to stabilise before next replica
      ansible.builtin.pause:
        seconds: 15


# ---------------------------------------------------------------------------
# PLAY 7 – Final verification
# ---------------------------------------------------------------------------
- name: "Verification: Cluster health check"
  hosts: pgpool
  tasks:

    - name: Show all pgpool nodes and their status
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ pgpool_port }} -U pgpool -d template1
          -c "SHOW pool_nodes;"
      register: final_nodes
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: final_nodes.stdout_lines

    - name: Assert all nodes are 'up'
      ansible.builtin.assert:
        that:
          - "'down' not in final_nodes.stdout"
        fail_msg: "One or more pgpool nodes are reported as DOWN. Check cluster manually."
        success_msg: "All pgpool nodes are UP. Cluster rebuild completed successfully."

    - name: Run a test read query through pgpool
      become_user: postgres
      ansible.builtin.command: >
        psql -h 127.0.0.1 -p {{ pgpool_port }} -U pgpool -d appdb
          -c "SELECT version();"
      register: test_query
      changed_when: false

    - name: Print PostgreSQL version via pgpool
      ansible.builtin.debug:
        var: test_query.stdout_lines
